<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Switch — Google Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Главная кнопка — как в Google Material Design */
        .center-btn {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: #1a73e8; /* Google Blue */
            border: none;
            box-shadow: 0 8px 20px rgba(26, 115, 232, 0.3);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .center-btn::after {
            content: '';
            display: block;
            width: 70px;
            height: 70px;
            background-color: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            transition: all 0.2s;
        }

        .center-btn:hover {
            background: #1b66c9;
            box-shadow: 0 12px 28px rgba(26, 115, 232, 0.4);
            transform: scale(1.02);
        }

        .center-btn:active {
            transform: scale(0.96);
            background: #155ab0;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.4);
        }

        /* Маленькая кнопка в углу — Google-style FAB */
        .corner-btn {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 72px;
            height: 72px;
            border-radius: 50%; /* Круглая как FAB */
            border: none;
            background: #ea4335; /* Google Red */
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .corner-btn::after {
            content: '';
            display: block;
            width: 32px;
            height: 32px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            transition: all 0.2s;
        }

        .corner-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
        }

        .corner-btn:active {
            transform: scale(0.92);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
        }

        /* Режимы угловой кнопки */
        .corner-btn.mode-a {
            background: #ea4335; /* Красный */
        }

        .corner-btn.mode-b {
            background: #f9ab00; /* Google Yellow */
        }

        .center-btn:focus-visible, .corner-btn:focus-visible {
            outline: 2px solid #1a73e8;
            outline-offset: 4px;
        }

        .center-btn.pulse {
            animation: google-pulse 0.15s ease-out;
        }

        @keyframes google-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); background: #4285f4; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <button class="center-btn" id="soundBtn" aria-label="звуковая кнопка"></button>
    <button class="corner-btn mode-a" id="modeBtn" aria-label="переключить режим"></button>

    <script>
        (function() {
            // ⚠️ Пути к твоим звукам
            const SOUND_FILES = {
                A: 'sound1.mp3',
                B: 'sound2.mp3'
            };
            
            let currentMode = 'A';
            let lastClickTime = 0;
            let rapidClickCount = 0;
            const RAPID_INTERVAL = 350; // мс
            
            const centerBtn = document.getElementById('soundBtn');
            const modeBtn = document.getElementById('modeBtn');
            
            // Разрешаем звуки при первом клике куда угодно
            let audioContext = null;
            function initAudio() {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }
            }
            
            // Воспроизведение с ПОЛНЫМ наложением (каждый клик = новый звук)
            function playSound(mode) {
                try {
                    initAudio(); // гарантируем, что аудио контекст жив
                    
                    // СОЗДАЁМ НОВЫЙ audio КАЖДЫЙ РАЗ — это даёт наложение
                    const audio = new Audio(SOUND_FILES[mode]);
                    
                    const now = Date.now();
                    const timeSinceLast = now - lastClickTime;
                    
                    // Счётчик быстрых кликов
                    if (timeSinceLast < RAPID_INTERVAL) {
                        rapidClickCount = Math.min(rapidClickCount + 1, 8);
                    } else {
                        rapidClickCount = 0;
                    }
                    
                    // Громкость: от 0.3 до 2.0 (чем быстрее клики, тем громче)
                    let volume;
                    if (rapidClickCount === 0) {
                        volume = 0.3;
                    } else {
                        volume = Math.min(2.0, 0.3 + rapidClickCount * 0.25);
                    }
                    
                    audio.volume = volume;
                    
                    // ВАЖНО: каждый раз новый play() — звуки накладываются
                    audio.play().catch(e => {
                        // игнорируем ошибки первого клика
                        console.log('Нажми на страницу сначала');
                    });
                    
                    lastClickTime = now;
                    
                    // Визуальный фидбек
                    centerBtn.classList.add('pulse');
                    setTimeout(() => {
                        centerBtn.classList.remove('pulse');
                    }, 150);
                    
                } catch (e) {
                    console.log('Ошибка:', e);
                }
            }
            
            // Клик по центру
            centerBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                playSound(currentMode);
            });
            
            // Переключение режима
            modeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                
                if (currentMode === 'A') {
                    currentMode = 'B';
                    modeBtn.classList.remove('mode-a');
                    modeBtn.classList.add('mode-b');
                } else {
                    currentMode = 'A';
                    modeBtn.classList.remove('mode-b');
                    modeBtn.classList.add('mode-a');
                }
                
                // Микро-анимация
                modeBtn.style.transform = 'scale(0.9)';
                setTimeout(() => {
                    modeBtn.style.transform = '';
                }, 120);
                
                // Предзагружаем звук нового режима
                new Audio(SOUND_FILES[currentMode]).load();
            });
            
            // Предзагрузка обоих звуков
            window.addEventListener('load', () => {
                new Audio(SOUND_FILES.A).load();
                new Audio(SOUND_FILES.B).load();
            });
            
            // Инициализация аудио при любом клике на странице
            document.body.addEventListener('click', () => {
                initAudio();
            }, { once: true });
            
            // Запрет контекстного меню
            centerBtn.oncontextmenu = (e) => e.preventDefault();
            modeBtn.oncontextmenu = (e) => e.preventDefault();
        })();
    </script>
</body>
</html>

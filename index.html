<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>порядковые фрагменты · игра</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: #f0f2f5;  /* светлый фон как в Telegram */
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            margin: 0;
        }

        /* основной контейнер на всю площадь */
        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* изначально 2 (будет меняться) */
            gap: 14px;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1 / 1;  /* квадратное поле */
            background: transparent;
        }

        /* карточка-фрагмент — скруглённые углы, никаких теней, всё плоско и модно */
        .tile {
            background-color: #ffffff;
            border-radius: 24px;  /* мягкое скругление как в Telegram */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: min(6vw, 3rem);
            font-weight: 600;
            color: #1e1e2a;
            cursor: pointer;
            transition: background-color 0.15s ease, transform 0.1s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.04);
            aspect-ratio: 1 / 1;
            -webkit-tap-highlight-color: transparent;
            padding: 0; /* без внутренних отступов */
        }

        /* при тапе лёгкое сжатие — очень деликатно */
        .tile:active {
            transform: scale(0.97);
        }

        /* зелёный при правильном порядке */
        .tile.correct {
            background-color: #8fcf6b;  /* мягкий зелёный (Telegram-style) */
            color: white;
            transition: 0.1s;
        }

        /* красный при ошибке (временный) */
        .tile.wrong {
            background-color: #ff6b6b;  /* приглушённый красный */
            color: white;
            transition: 0.05s;
        }

        /* планшеты/телефоны — чуть меньше скругление */
        @media (max-width: 480px) {
            .tile {
                border-radius: 20px;
                font-size: min(8vw, 3rem);
            }
            .game-board {
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- поле будет заполняться динамически через js -->
    <div class="game-board" id="gameBoard"></div>

    <script>
        (function() {
            const board = document.getElementById('gameBoard');

            // начальное количество плиток = 2
            let currentLevel = 1;       // уровень 1: 2 плитки, уровень 2: 4, уровень 3: 8 и т.д.
            let tilesCount = 2;          // 2 ^ currentLevel (но начнём с 2, т.е. 2^1)
            let tiles = [];              // массив DOM-элементов
            let nextExpected = 1;         // следующий номер для нажатия (от 1 до tilesCount)
            let lock = false;             // блокировка на время анимации ошибки

            // генерация поля
            function generateBoard(count) {
                board.innerHTML = '';      // очищаем
                const cols = Math.sqrt(count); // так как count всегда степень двойки, и квадрат целый
                board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

                for (let i = 1; i <= count; i++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.dataset.index = i;
                    tile.textContent = i;   // порядковый номер
                    board.appendChild(tile);
                }

                tiles = Array.from(document.querySelectorAll('.tile'));
                nextExpected = 1;  // всегда начинаем с 1
            }

            // сброс всех подсветок (убираем correct/wrong)
            function resetHighlights() {
                tiles.forEach(t => {
                    t.classList.remove('correct', 'wrong');
                });
            }

            // обработчик клика
            function handleTileClick(e) {
                const tile = e.currentTarget;
                // если заблокировано (идет красная вспышка) или уже зелёная (уже нажатая) — игнор
                if (lock || tile.classList.contains('correct')) return;

                const number = parseInt(tile.dataset.index, 10);

                // правильный порядок?
                if (number === nextExpected) {
                    // красим в зелёный
                    tile.classList.add('correct');
                    nextExpected++;

                    // если все плитки нажаты по порядку — переходим на следующий уровень
                    if (nextExpected > tilesCount) {
                        // переходим на новый уровень: удваиваем количество
                        tilesCount *= 2;
                        if (tilesCount > 64) tilesCount = 64; // ограничим, чтобы не слишком много
                        generateBoard(tilesCount);
                    }
                } else {
                    // ошибка: красная вспышка на этой плитке
                    lock = true;
                    tile.classList.add('wrong');

                    // через 200 мс убираем красный и разблокируем
                    setTimeout(() => {
                        tile.classList.remove('wrong');
                        lock = false;
                    }, 200);

                    // также можно сбросить прогресс? по задаче: "если нет, красным на секунду" — ничего не сбрасываем, просто мигает.
                    // но можно добавить сброс всех зелёных? в условии не сказано, оставим как есть — зелёные остаются, игра продолжается.
                    // однако логичнее, если ошибка сбрасывает прогресс? но по описанию: "при нажатии очередно на все фрагменты начинался следующий уровень. Если нажимает по порядку, закрашивай фрагменты зеленым, если нет, красным на секунду."
                    // ничего не сказано про сброс, так что пусть зелёные остаются, и можно дальше собирать. 
                    // Но если нажать не по порядку, красная вспышка — и всё.
                }
            }

            // инициализация: 2 плитки
            function initGame() {
                tilesCount = 2;
                generateBoard(tilesCount);
                // навешиваем обработчики
                tiles.forEach(t => t.addEventListener('click', handleTileClick));
            }

            // так как при generateBoard создаются новые элементы, нужно обновлять обработчики
            // используем MutationObserver или просто переназначаем после генерации
            function attachListeners() {
                tiles.forEach(t => t.addEventListener('click', handleTileClick));
            }

            // переопределим generateBoard с обновлением обработчиков
            const originalGenerate = generateBoard;
            generateBoard = function(count) {
                originalGenerate(count);
                attachListeners();
                // сбрасываем блокировку и nextExpected
                nextExpected = 1;
                lock = false;
            };

            // старт
            initGame();

            // опционально: добавим эффект двойного клика для сброса (не просили, но можно скрыто)
            // но лучше без лишнего
        })();
    </script>
</body>
</html>

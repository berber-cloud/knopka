<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Buttons — 5 режимов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: #f8faff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Центральная кнопка — чистый синий круг */
        .center-btn {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: #1a73e8;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px rgba(26, 115, 232, 0.3);
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .center-btn:hover {
            background: #0d5fcf;
            transform: scale(1.02);
            box-shadow: 0 15px 30px rgba(26, 115, 232, 0.4);
        }

        .center-btn:active {
            transform: scale(0.96);
            background: #0a4faf;
            box-shadow: 0 5px 15px rgba(26, 115, 232, 0.4);
        }

        /* Маленькая кнопка в углу */
        .corner-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: #ea4335; /* красный по умолчанию */
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.15);
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .corner-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
        }

        .corner-btn:active {
            transform: scale(0.92);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        /* 5 режимов — все цвета радуги */
        .corner-btn.mode-1 { background: #ea4335; } /* красный */
        .corner-btn.mode-2 { background: #f9ab00; } /* жёлтый */
        .corner-btn.mode-3 { background: #34a853; } /* зелёный (Google Green) */
        .corner-btn.mode-4 { background: #4285f4; } /* синий */
        .corner-btn.mode-5 { background: #a142f4; } /* фиолетовый */

        .center-btn:focus-visible, .corner-btn:focus-visible {
            outline: 3px solid #1a73e8;
            outline-offset: 4px;
        }

        .center-btn.pulse {
            animation: button-pulse 0.15s ease-out;
        }

        @keyframes button-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); background: #4285f4; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <button class="center-btn" id="soundBtn" aria-label="звуковая кнопка"></button>
    <button class="corner-btn mode-1" id="modeBtn" aria-label="переключить режим"></button>

    <script>
        (function() {
            // 📁 ПУТИ К 5 ЗВУКАМ — добавь свои файлы в папку sounds
            const SOUND_FILES = {
                1: 'sound1.mp3', // красный режим
                2: 'sound2.mp3', // жёлтый режим
                3: 'sound3.mp3', // зелёный режим
                4: 'sound4.mp3', // синий режим
                5: 'sound5.mp3'  // фиолетовый режим
            };
            
            let currentMode = 1; // начинаем с красного (1)
            let lastClickTime = 0;
            let rapidClickCount = 0;
            const RAPID_INTERVAL = 350;
            
            const centerBtn = document.getElementById('soundBtn');
            const modeBtn = document.getElementById('modeBtn');
            
            // Тот самый рабочий звуковой движок
            function playSound(mode) {
                try {
                    const audio = new Audio(SOUND_FILES[mode]);
                    
                    const now = Date.now();
                    const timeSinceLast = now - lastClickTime;
                    
                    if (timeSinceLast < RAPID_INTERVAL) {
                        rapidClickCount = Math.min(rapidClickCount + 1, 5);
                    } else {
                        rapidClickCount = 0;
                    }
                    
                    const volume = Math.min(1.0, 0.3 + rapidClickCount * 0.15);
                    audio.volume = volume;
                    
                    audio.play().catch(e => console.log('Нажми на страницу сначала'));
                    
                    lastClickTime = now;
                    
                    centerBtn.classList.add('pulse');
                    setTimeout(() => {
                        centerBtn.classList.remove('pulse');
                    }, 150);
                    
                } catch (e) {
                    console.log('Ошибка:', e);
                }
            }
            
            centerBtn.addEventListener('click', () => {
                playSound(currentMode);
            });
            
            // Переключение режимов по кругу (1 → 2 → 3 → 4 → 5 → 1)
            modeBtn.addEventListener('click', () => {
                // Следующий режим (если 5, то возвращаемся к 1)
                currentMode = currentMode === 5 ? 1 : currentMode + 1;
                
                // Удаляем все возможные классы режимов
                modeBtn.classList.remove('mode-1', 'mode-2', 'mode-3', 'mode-4', 'mode-5');
                // Добавляем новый класс
                modeBtn.classList.add(`mode-${currentMode}`);
                
                // Визуальный фидбек
                modeBtn.style.transform = 'scale(0.9)';
                setTimeout(() => {
                    modeBtn.style.transform = '';
                }, 120);
                
                // Предзагружаем звук нового режима
                new Audio(SOUND_FILES[currentMode]).load();
            });
            
            window.addEventListener('load', () => {
                // Предзагружаем все 5 звуков
                new Audio(SOUND_FILES[1]).load();
                new Audio(SOUND_FILES[2]).load();
                new Audio(SOUND_FILES[3]).load();
                new Audio(SOUND_FILES[4]).load();
                new Audio(SOUND_FILES[5]).load();
            });
            
            centerBtn.oncontextmenu = (e) => e.preventDefault();
            modeBtn.oncontextmenu = (e) => e.preventDefault();
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>синяя кнопка + ползунок</title>
    <style>
        /* абсолютный минимум, никаких лишних окон, карточек, подложек */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background-color: #ffffff; /* меняется скриптом */
            margin: 0;
            padding: 20px;
            transition: background-color 0.1s ease;
        }

        /* флекс-контейнер: только кнопка и ползунок, по вертикали */
        .pure-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3rem; /* расстояние между кнопкой и ползунком */
            width: 100%;
            max-width: 500px;
            padding: 20px 0;
        }

        /* КРУГЛАЯ КНОПКА — синяя, без текста */
        .blue-round {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background-color: #2563eb; /* чистый синий */
            border: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
            transition: background-color 0.1s, transform 0.05s;
            flex-shrink: 0;
        }

        .blue-round:active {
            transform: scale(0.96);
            background-color: #1d4ed8; /* чуть темнее при нажатии */
        }

        /* ПОЛЗУНОК — синяя дорожка и синий эллипс-бегунок */
        .blue-slider {
            -webkit-appearance: none;
            width: 100%;
            max-width: 400px;
            height: 12px;
            background-color: #3b82f6; /* синяя дорожка */
            border-radius: 30px;
            outline: none;
            border: none;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        /* бегунок в форме эллипса (прямоугольник со скруглением) — тоже синий */
        .blue-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 48px;
            height: 30px;
            background-color: #1e3a8a; /* тёмно-синий для контраста */
            border-radius: 40% / 50%;
            cursor: pointer;
            border: 2px solid #ffffff80;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .blue-slider::-webkit-slider-thumb:hover {
            background-color: #2563eb;
        }

        /* firefox */
        .blue-slider::-moz-range-thumb {
            width: 48px;
            height: 30px;
            background-color: #1e3a8a;
            border-radius: 40% / 50%;
            cursor: pointer;
            border: 2px solid #ffffff80;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .blue-slider::-moz-range-track {
            background-color: #3b82f6;
            border-radius: 30px;
            height: 12px;
            border: none;
        }

        /* мобильная чуть меньше */
        @media (max-width: 480px) {
            .pure-controls {
                gap: 2.5rem;
            }
            .blue-round {
                width: 150px;
                height: 150px;
            }
            .blue-slider {
                max-width: 300px;
            }
        }
    </style>
</head>
<body id="body">
    <!-- только кнопка и ползунок, ничего лишнего -->
    <div class="pure-controls">
        <button class="blue-round" id="colorButton" aria-label="сменить цвет"></button>
        <input type="range" class="blue-slider" id="brightnessSlider" min="0" max="100" value="100" aria-label="яркость">
    </div>

    <script>
        (function() {
            const body = document.getElementById('body');
            const colorButton = document.getElementById('colorButton');
            const brightnessSlider = document.getElementById('brightnessSlider');

            // Палитра насыщенных цветов (не пастель)
            const colorPalette = [
                '#F97316', // оранжевый
                '#10B981', // изумрудный
                '#EC4899', // розовый
                '#8B5CF6', // фиолетовый
                '#F43F5E', // розово-красный
                '#14B8A6', // бирюзовый
                '#F59E0B', // янтарный
                '#6366F1', // индиго
                '#EF4444', // красный
                '#06B6D4', // циан
                '#D946EF', // маджента
                '#84CC16', // салатовый
            ];

            // Текущий цвет в HSL
            let currentHue = 0;
            let currentSaturation = 0;
            let isWhiteMode = true;     // начинаем с белого

            // яркость (0..1)
            let brightnessFactor = 1;

            // Обновление фона
            function updateBackground() {
                if (isWhiteMode) {
                    // белый режим: яркость от белого до чёрного
                    let lightness = brightnessFactor; // 0..1
                    body.style.backgroundColor = `hsl(0, 0%, ${lightness * 100}%)`;
                } else {
                    // цветной режим: яркость меняет светлоту, но при 100% остаётся цвет (не белый)
                    let minLight = 0.15;
                    let maxLight = 0.92;
                    let lightness = minLight + (maxLight - minLight) * brightnessFactor;
                    body.style.backgroundColor = `hsl(${currentHue}, ${currentSaturation * 100}%, ${lightness * 100}%)`;
                }
            }

            // конвертер HEX -> HSL (та же функция)
            function hexToHsl(hex) {
                let r = parseInt(hex.slice(1,3), 16) / 255;
                let g = parseInt(hex.slice(3,5), 16) / 255;
                let b = parseInt(hex.slice(5,7), 16) / 255;

                let max = Math.max(r, g, b);
                let min = Math.min(r, g, b);
                let h, s, l = (max + min) / 2;

                if (max === min) {
                    h = s = 0;
                } else {
                    let d = max - min;
                    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                    switch (max) {
                        case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                        case g: h = (b - r) / d + 2; break;
                        case b: h = (r - g) / d + 4; break;
                    }
                    h /= 6;
                }
                return { h: h * 360, s: s };
            }

            // выбор случайного цвета
            function pickRandomColor() {
                const hex = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                const { h, s } = hexToHsl(hex);
                currentHue = h;
                currentSaturation = s;
                isWhiteMode = false;
                updateBackground();
            }

            // обработчик кнопки
            colorButton.addEventListener('click', pickRandomColor);

            // двойной клик — сброс на белый
            colorButton.addEventListener('dblclick', () => {
                isWhiteMode = true;
                updateBackground();
            });

            // ползунок яркости
            brightnessSlider.addEventListener('input', (e) => {
                brightnessFactor = parseFloat(e.target.value) / 100;
                updateBackground();
            });

            // инициализация: белый фон
            isWhiteMode = true;
            brightnessFactor = 1;
            updateBackground();
        })();
    </script>
</body>
</html>
